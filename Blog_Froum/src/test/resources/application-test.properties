# 测试环境配置
spring.application.name=Blog_Froum_Test

# 使用 MySQL 测试库进行测试
spring.datasource.url=jdbc:mysql://localhost:3306/blog_forum_test?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# 数据库初始化
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# MyBatis配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.blog_froum.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT配置
jwt.secret=testSecretKey123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890
jwt.expiration=86400000

# 日志配置
logging.level.com.example.blog_froum=DEBUG
logging.level.org.springframework.web=INFO
