# Application name
spring.application.name=Blog_Froum

# Server configuration
server.port=8080

# MySQL database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_forum?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Database initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# MyBatis configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.blog_froum.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper pagination configuration
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql

# CORS configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5177,http://localhost:5178,http://localhost:5179,http://localhost:5180,http://localhost:5181,http://localhost:5182,http://localhost:5183,http://localhost:5184,http://localhost:5185,http://localhost:5190,http://localhost:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.path=./uploads
file.upload.url-prefix=http://localhost:8080/uploads

# JWT configuration
jwt.secret=${JWT_SECRET:change-me-development-secret-change-before-production-256-bits-minimum-required}
jwt.expiration=${JWT_EXPIRATION:86400}

# Logging configuration
logging.level.com.example.blog_froum=DEBUG
logging.level.org.springframework.web=DEBUG

# Springfox/Swagger configuration to fix compatibility issues with Spring Boot 2.7.x
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true
springfox.documentation.swagger-ui.enabled=true
springfox.documentation.swagger.v2.enabled=true

# Date and time format configuration
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false
