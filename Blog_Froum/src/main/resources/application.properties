# Application name
spring.application.name=Blog_Froum

# Server configuration
server.port=8080

# MySQL database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_forum?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Database initialization
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# MyBatis configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.blog_froum.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# PageHelper pagination configuration
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql

# CORS configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5177,http://localhost:5178,http://localhost:5179,http://localhost:5180,http://localhost:5181,http://localhost:5182,http://localhost:5183,http://localhost:5184,http://localhost:5185,http://localhost:5190,http://localhost:8081
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.path=./uploads
file.upload.url-prefix=http://localhost:8080/uploads

# JWT configuration
jwt.secret=${JWT_SECRET:change-me-development-secret-change-before-production-256-bits-minimum-required}
jwt.expiration=${JWT_EXPIRATION:604800}

# OAuth login configuration
oauth.frontend-callback-url=${OAUTH_FRONTEND_CALLBACK_URL:http://localhost:5181/oauth/callback}
oauth.google.client-id=${GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth.github.client-id=${GITHUB_CLIENT_ID:}
oauth.github.client-secret=${GITHUB_CLIENT_SECRET:}

# Redis verification code storage
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=${REDIS_TIMEOUT:3000ms}
spring.data.redis.repositories.enabled=false

# Brevo SMTP defaults. Secrets should be provided through env vars or admin system settings.
brevo.smtp.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
brevo.smtp.port=${BREVO_SMTP_PORT:587}
brevo.smtp.username=${BREVO_SMTP_USERNAME:}
brevo.smtp.password=${BREVO_SMTP_PASSWORD:}
brevo.smtp.sender-email=${BREVO_SENDER_EMAIL:}
brevo.smtp.sender-name=${BREVO_SENDER_NAME:FroumX 社区}

# Logging configuration
logging.level.com.example.blog_froum=DEBUG
logging.level.org.springframework.web=DEBUG

# Springfox/Swagger configuration to fix compatibility issues with Spring Boot 2.7.x
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.main.allow-bean-definition-overriding=true
springfox.documentation.swagger-ui.enabled=true
springfox.documentation.swagger.v2.enabled=true

# Date and time format configuration
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.serialization.write-dates-as-timestamps=false

# Tianai Captcha (TAC)
security.tac.enabled=true
captcha.init-default-resource=true
captcha.expire.default=120000
