name = "froumx-image-worker"
main = "src/index.js"
compatibility_date = "2026-07-02"

[[r2_buckets]]
binding = "FORUM_IMAGES"
bucket_name = "your-r2-bucket-name"

[images]
binding = "IMAGES"

[vars]
ALLOWED_REFERERS = "https://your-forum-domain.com,http://localhost:5181"
ALLOW_EMPTY_REFERER = "false"
CACHE_TTL_SECONDS = "31536000"
PRIVATE_PREFIXES = "private/"
PUBLIC_PREFIXES = "images/,documents/"
ENABLE_IMAGE_TRANSFORM = "true"
DEFAULT_IMAGE_FORMAT = "image/webp"
DEFAULT_IMAGE_QUALITY = "82"

# Optional, set with:
# wrangler secret put IMAGE_SIGNING_SECRET
# wrangler secret put AUTH_API_URL
